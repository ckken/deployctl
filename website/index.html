<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>deployctl 0.3</title>
    <link rel="stylesheet" href="./site.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">deployctl 0.3</p>
        <h1>生成上传链接，发给 agent，直接传文件。</h1>
        <p class="hero-copy">
          服务部署在当前域名下。管理侧只需要一个 <code>adminKey</code>，默认就能生成 24 小时、单文件的上传链接；需要时再展开高级参数指定目录和时间。
        </p>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2>上传授权</h2>
            <p>当前服务域名：<span id="server-origin"></span></p>
          </div>
          <button id="clear-admin-key" class="ghost-button" type="button">清空 adminKey</button>
        </div>

        <form id="grant-form" class="stack">
          <label class="field">
            <span>adminKey</span>
            <input id="admin-key" name="adminKey" type="password" placeholder="输入一次后会保存在本地" autocomplete="off" required />
          </label>

          <details class="advanced">
            <summary>高级参数</summary>
            <div class="advanced-grid">
              <label class="field">
                <span>folder</span>
                <input id="folder" name="folder" type="text" placeholder="默认 uploads/YYYY/MM/DD" />
              </label>
              <label class="field">
                <span>expires_in</span>
                <input id="expires-in" name="expiresIn" type="text" value="24h" />
              </label>
              <label class="field">
                <span>max_files</span>
                <input id="max-files" name="maxFiles" type="number" min="1" value="1" />
              </label>
            </div>
          </details>

          <div class="actions">
            <button id="generate-link" class="primary-button" type="submit">生成并复制上传链接</button>
            <button id="refresh-data" class="secondary-button" type="button">刷新</button>
          </div>
        </form>

        <p id="status" class="status">输入 adminKey 后即可生成上传链接。</p>
      </section>

      <section class="panel result-panel">
        <div class="panel-heading">
          <div>
            <h2>最近生成的链接</h2>
            <p>删除后立即失效，不保留旧地址。</p>
          </div>
        </div>
        <div id="latest-link" class="empty">还没有生成上传链接。</div>
        <div id="links-list" class="list"></div>
      </section>

      <section class="panel result-panel">
        <div class="panel-heading">
          <div>
            <h2>最近上传结果</h2>
            <p>上传完成后会在这里看到文件地址和保存目录。</p>
          </div>
        </div>
        <div id="uploads-list" class="list empty">还没有上传记录。</div>
      </section>
    </main>

    <script src="./site.js"></script>
  </body>
</html>
