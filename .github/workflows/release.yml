name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o "dist/deployctl-${GOOS}-${GOARCH}" ./cmd/deployctl
          go build -o "dist/deployd-${GOOS}-${GOARCH}" ./cmd/deployd
          rm -rf "dist/package-${GOOS}-${GOARCH}"
          mkdir -p "dist/package-${GOOS}-${GOARCH}/website"
          cp "dist/deployctl-${GOOS}-${GOARCH}" "dist/package-${GOOS}-${GOARCH}/"
          cp "dist/deployd-${GOOS}-${GOARCH}" "dist/package-${GOOS}-${GOARCH}/"
          cp -R website/. "dist/package-${GOOS}-${GOARCH}/website/"
          tar -C "dist/package-${GOOS}-${GOARCH}" -czf "dist/deployctl_${GOOS}_${GOARCH}.tar.gz" .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.tar.gz
